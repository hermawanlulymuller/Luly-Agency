<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Luly Agency</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/index.css">
    <link rel="stylesheet" href="/src/styles/auth.css">
</head>
<body>
    <main class="auth-page">
        <div class="auth-card glass">
            <a href="/" class="logo auth-logo"><span class="logo-accent">Luly</span> Agency</a>
            <h1 class="section-title text-center">Buat Akun</h1>
            <p class="section-desc text-center">Daftar untuk mengakses dashboard SaaS Luly Agency.</p>

            <form id="auth-form" class="auth-form">
                <div class="form-group">
                    <label for="full_name">Nama Lengkap</label>
                    <input type="text" id="full_name" name="full_name" required placeholder="Contoh: Ahmad Santoso">
                </div>
                <div class="form-group">
                    <label for="whatsapp">Nomor WhatsApp</label>
                    <input type="tel" id="whatsapp" name="whatsapp" required placeholder="Contoh: 08123456789">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="nama@email.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Min. 6 karakter" minlength="6">
                </div>
                <p id="auth-error" class="auth-error"></p>
                <button type="submit" class="btn btn-primary btn-block">Daftar</button>
            </form>

            <p class="auth-footer text-center text-muted">
                Sudah punya akun? <a href="/login" class="gradient-text">Masuk di sini</a>
            </p>
        </div>
    </main>

    <script src="/src/js/config/env.runtime.js"></script>
    <script type="module" src="/src/js/pages/register.js"></script>
</body>
</html>
